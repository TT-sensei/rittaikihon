<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>さわってわかる！直方体と立方体マスター</title>
<style>
    :root { 
        --primary: #4CAF50; --secondary: #FF9800; --bg: #f4f9f4; --text: #333; 
        --w: 120px; --h: 120px; --d: 120px; 
    }
    body { font-family: 'Hiragino Maru Gothic ProN', 'Meiryo', sans-serif; background: var(--bg); color: var(--text); margin: 0; user-select: none; overflow-x: hidden; }
    header { background: var(--primary); color: white; text-align: center; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    
    .tabs { display: flex; justify-content: center; background-color: #388E3C; }
    .tab-btn { background: none; border: none; color: white; padding: 15px 30px; font-size: 1.2rem; cursor: pointer; font-weight: bold; transition: 0.3s; margin: 0; }
    .tab-btn.active { background-color: var(--secondary); border-bottom: 4px solid #E65100; }
    
    .container { max-width: 900px; margin: 20px auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .mode-section { display: none; } 
    .mode-section.active { display: block; animation: fadeIn 0.5s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .controls { text-align: center; margin-bottom: 10px; }
    .desc-text { text-align: center; font-size: 1.1rem; color: #E65100; font-weight: bold; margin-bottom: 20px; }
    
    .scene { position: relative; width: 300px; height: 300px; margin: 20px auto; perspective: 800px; cursor: grab; touch-action: none; }
    .scene:active { cursor: grabbing; }
    
    .cube { position: absolute; top: 50%; left: 50%; width: 0; height: 0; transform-style: preserve-3d; transform: rotateX(-25deg) rotateY(30deg); }
    .face { position: absolute; border: 2px solid #333; background: rgba(100, 150, 255, 0.7); display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; font-size: 1.2rem; color: #333; transition: background 0.3s, color 0.3s, width 0.5s, height 0.5s, transform 0.5s; }
    .face.counted { background: rgba(255, 100, 100, 0.9); color: white; }
    
    .front  { width: var(--w); height: var(--h); transform: translate(-50%, -50%) translateZ(calc(var(--d) / 2)); }
    .back   { width: var(--w); height: var(--h); transform: translate(-50%, -50%) rotateY(180deg) translateZ(calc(var(--d) / 2)); }
    .top    { width: var(--w); height: var(--d); transform: translate(-50%, -50%) rotateX(90deg) translateZ(calc(var(--h) / 2)); }
    .bottom { width: var(--w); height: var(--d); transform: translate(-50%, -50%) rotateX(-90deg) translateZ(calc(var(--h) / 2)); }
    .left   { width: var(--d); height: var(--h); transform: translate(-50%, -50%) rotateY(-90deg) translateZ(calc(var(--w) / 2)); }
    .right  { width: var(--d); height: var(--h); transform: translate(-50%, -50%) rotateY(90deg) translateZ(calc(var(--w) / 2)); }
    
    button { padding: 10px 20px; margin: 5px; font-size: 1rem; background: var(--secondary); color: white; border: none; border-radius: 5px; cursor: pointer; box-shadow: 0 4px 0 #E65100; font-weight: bold; }
    button:active { transform: translateY(4px); box-shadow: none; }
    
    .paint-grid { display: grid; grid-template-columns: repeat(6, 40px); gap: 3px; justify-content: center; margin-top: 20px; }
    .cell { width: 40px; height: 40px; background: #ddd; cursor: pointer; border-radius: 4px; transition: background 0.2s; } 
    .cell.active { background: #4CAF50; }
    .result { font-size: 1.2rem; margin-top: 15px; font-weight: bold; text-align: center; min-height: 30px; }
    
    .question-box { background: #fff8e1; border-left: 6px solid var(--secondary); padding: 20px; margin-bottom: 20px; border-radius: 4px; user-select: text; }
    .question-box h3 { margin-top: 0; color: #E65100; }
    .svg-container { text-align: center; margin: 15px 0; background: white; padding: 10px; border-radius: 8px;}
    input[type="number"], select { width: 120px; padding: 8px; font-size: 1rem; border: 2px solid #ccc; border-radius: 4px; text-align: center; }
    .feedback { font-weight: bold; margin-left: 10px; } 
    .correct { color: #4CAF50; } .incorrect { color: #F44336; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

<header>
    <h1>📦 さわってわかる！直方体と立方体マスター</h1>
</header>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('sim', this)">✋ さわって学ぶ</button>
    <button class="tab-btn" onclick="switchTab('prob', this)">✏️ 問題をとく</button>
</div>

<div class="container">
    <div id="sim" class="mode-section active">
        <h2>① 指で回して、形をたしかめよう</h2>
        <div class="controls">
            <button onclick="setCube()">立方体</button>
            <button onclick="setCuboid()">直方体</button>
            <button onclick="resetFaceCount()" style="background:#555; box-shadow:0 4px 0 #333;">色をリセット</button>
        </div>
        <div id="shapeDesc" class="desc-text">すべての辺の長さが同じです。</div>
        
        <div class="scene" id="scene">
            <div class="cube" id="cube">
                <div class="face front" onclick="countFace(this)">前</div>
                <div class="face back" onclick="countFace(this)">後</div>
                <div class="face top" onclick="countFace(this)">上</div>
                <div class="face bottom" onclick="countFace(this)">下</div>
                <div class="face left" onclick="countFace(this)">左</div>
                <div class="face right" onclick="countFace(this)">右</div>
            </div>
        </div>
        <div style="text-align: center; font-size: 1.2rem; font-weight: bold;">
            さわった面: <span id="faceCount" style="color: red; font-size: 1.5rem;">0</span> / 6
        </div>

        <hr style="margin: 30px 0; border: 1px dashed #ccc;">

        <h2>② 立方体の展開図を作ろう</h2>
        <p style="text-align: center;">6つのマスを塗って、正しい展開図になるか判定しよう！</p>
        <div class="paint-grid" id="grid"></div>
        <div style="text-align: center; margin-top: 20px;">
            <button onclick="checkNetWithSimulation()" style="background: #E91E63; box-shadow: 0 4px 0 #C2185B;">組み立てシミュレーション！</button>
            <button onclick="resetGrid()" style="background:#555; box-shadow:0 4px 0 #333;">ぜんぶ消す</button>
        </div>
        <div class="result" id="netResult"></div>

        <div id="three-container" style="width: 100%; max-width: 450px; height: 350px; margin: 20px auto; display: none; position: relative; border: 3px solid #FF9800; border-radius: 8px; background: #fff8e1; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
            <div id="success-mark" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 160px; color: rgba(76, 175, 80, 0.9); font-weight: bold; display: none; pointer-events: none; z-index: 10; text-shadow: 3px 3px 6px rgba(0,0,0,0.2);">⚪︎</div>
            <div id="fail-mark" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 160px; color: rgba(244, 67, 54, 0.9); font-weight: bold; display: none; pointer-events: none; z-index: 10; text-shadow: 3px 3px 6px rgba(0,0,0,0.2);">❌</div>
        </div>
    </div>

    <div id="prob" class="mode-section">
        <h2 style="text-align:center;">✏️ ランダムクイズにちょうせん！</h2>
        <div id="questions-container">
            <p style="text-align:center; color:#666;">問題を読み込み中... (questions.js が必要です)</p>
        </div>
    </div>
</div>

<script src="questions.js"></script>

<script>
// 音とUIの基本機能はそのまま維持
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
    osc.connect(gainNode); gainNode.connect(audioCtx.destination);
    
    if (type === 'click') {
        osc.frequency.setValueAtTime(800, audioCtx.currentTime); 
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); 
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); 
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'success') {
        osc.type = 'triangle'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); 
        gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4); 
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'error') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.4);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4); 
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }
}

function switchTab(tabId, btn) {
    playSound('click');
    document.querySelectorAll('.mode-section').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    btn.classList.add('active');
}

let faceCount = 0;
function countFace(element) {
    if (!element.classList.contains("counted")) {
        playSound('click'); element.classList.add("counted"); faceCount++;
        document.getElementById("faceCount").innerText = faceCount;
        if(faceCount === 6) setTimeout(() => { playSound('success'); alert("すごい！6つの面をぜんぶ見つけたね！"); }, 200);
    }
}
function resetFaceCount() { 
    faceCount = 0; document.getElementById("faceCount").innerText = faceCount; 
    document.querySelectorAll('.face').forEach(f => f.classList.remove("counted")); 
}

const root = document.documentElement;
const descText = document.getElementById("shapeDesc");

function setCube(){ playSound('click'); root.style.setProperty('--w', '120px'); root.style.setProperty('--h', '120px'); root.style.setProperty('--d', '120px'); descText.innerText = "立方体：すべての辺の長さが同じです。"; resetFaceCount(); }
function setCuboid(){ playSound('click'); root.style.setProperty('--w', '160px'); root.style.setProperty('--h', '80px'); root.style.setProperty('--d', '120px'); descText.innerText = "直方体：縦、横、高さの長さが違います。"; resetFaceCount(); }

const scene = document.getElementById("scene");
const cube = document.getElementById("cube");
let isDragging = false, startX, startY, currentRotX = -25, currentRotY = 30;

scene.addEventListener("pointerdown", (e) => { isDragging = true; startX = e.clientX; startY = e.clientY; scene.setPointerCapture(e.pointerId); });
scene.addEventListener("pointermove", (e) => {
    if (!isDragging) return;
    currentRotY += (e.clientX - startX) * 0.5; currentRotX -= (e.clientY - startY) * 0.5;
    cube.style.transform = `rotateX(${currentRotX}deg) rotateY(${currentRotY}deg)`;
    startX = e.clientX; startY = e.clientY;
});
scene.addEventListener("pointerup", (e) => { isDragging = false; scene.releasePointerCapture(e.pointerId); });

// --- 展開図のグリッド ---
const grid = document.getElementById("grid");
let gridData = Array(6).fill().map(() => Array(6).fill(0));

for(let y=0; y<6; y++) {
    for(let x=0; x<6; x++) {
        let div = document.createElement("div"); div.className = "cell";
        div.onclick = () => {
            playSound('click'); div.classList.toggle("active");
            gridData[y][x] = div.classList.contains("active") ? 1 : 0;
        };
        grid.appendChild(div);
    }
}

function resetGrid() {
    playSound('click'); document.querySelectorAll('.cell').forEach(c => c.classList.remove("active"));
    gridData = Array(6).fill().map(() => Array(6).fill(0));
    document.getElementById("netResult").innerText = "";
    document.getElementById("three-container").style.display = "none";
}

// 🌟🌟🌟 新しいシミュレーション判定アルゴリズム 🌟🌟🌟
let threeRenderer, threeScene, threeCamera, animationId;

function checkNetWithSimulation() {
    const res = document.getElementById("netResult");
    let cells = [];
    for(let y=0; y<6; y++) for(let x=0; x<6; x++) if(gridData[y][x]) cells.push({x, y});
    
    // 1. マス目の数が6個かチェック
    if(cells.length !== 6) {
        res.innerText = `いま ${cells.length} コだよ。ぴったり6マス塗ってね。`;
        res.style.color = "#F44336";
        document.getElementById('three-container').style.display = 'none';
        playSound('error');
        return;
    }

    // Three.js空間の初期化
    const container = document.getElementById('three-container');
    container.style.display = 'block';
    document.getElementById('success-mark').style.display = 'none';
    document.getElementById('fail-mark').style.display = 'none';
    
    if(!threeRenderer) {
        threeRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        threeRenderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(threeRenderer.domElement);
        threeScene = new THREE.Scene();
        threeCamera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
        threeCamera.position.set(0, 8, 12); threeCamera.lookAt(0, 0, 0);
        threeScene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6); dirLight.position.set(5, 10, 7); threeScene.add(dirLight);
    }
    
    // 既存のオブジェクトをクリア
    while(threeScene.children.length > 2){ threeScene.remove(threeScene.children[2]); }
    if (animationId) cancelAnimationFrame(animationId);

    const s = 2; 
    const mat = new THREE.MeshPhongMaterial({ color: 0x4FC3F7, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
    const lineMat = new THREE.LineBasicMaterial({ color: 0x0277BD, linewidth: 2 });

    function createMesh() {
        const geo = new THREE.PlaneGeometry(s, s); const mesh = new THREE.Mesh(geo, mat);
        mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), lineMat));
        return mesh;
    }

    // 2. BFSで展開図の繋がり（木構造）を作る
    let cx = cells.reduce((sum, c) => sum + c.x, 0) / 6; let cy = cells.reduce((sum, c) => sum + c.y, 0) / 6;
    cells.sort((a,b) => (Math.pow(a.x-cx,2)+Math.pow(a.y-cy,2)) - (Math.pow(b.x-cx,2)+Math.pow(b.y-cy,2)));
    let rootCell = cells[0];

    let visited = new Set([`${rootCell.x},${rootCell.y}`]);
    let queue = [ {cell: rootCell, parentMesh: null, dir: null} ];
    let rootMesh = createMesh();
    rootMesh.rotation.x = -Math.PI/2; // 床に寝かせる
    threeScene.add(rootMesh);
    
    let hingeGroups = [];
    let allMeshes = [rootMesh];

    while(queue.length > 0) {
        let {cell, parentMesh, dir} = queue.shift();
        let currentMesh = rootMesh;
        
        if (parentMesh) {
            let hinge = new THREE.Group(); currentMesh = createMesh();
            if (dir === 'right') { hinge.position.set(s/2, 0, 0); currentMesh.position.set(s/2, 0, 0); hinge.userData.rot = {y: -Math.PI/2, x:0}; }
            else if (dir === 'left') { hinge.position.set(-s/2, 0, 0); currentMesh.position.set(-s/2, 0, 0); hinge.userData.rot = {y: Math.PI/2, x:0}; }
            else if (dir === 'up') { hinge.position.set(0, s/2, 0); currentMesh.position.set(0, s/2, 0); hinge.userData.rot = {x: Math.PI/2, y:0}; }
            else if (dir === 'down') { hinge.position.set(0, -s/2, 0); currentMesh.position.set(0, -s/2, 0); hinge.userData.rot = {x: -Math.PI/2, y:0}; }
            hinge.add(currentMesh); parentMesh.add(hinge); hingeGroups.push(hinge); allMeshes.push(currentMesh);
        }

        const neighbors = [ {dx: 1, dy: 0, dir: 'right'}, {dx: -1, dy: 0, dir: 'left'}, {dx: 0, dy: -1, dir: 'up'}, {dx: 0, dy: 1, dir: 'down'} ];
        for(let n of neighbors) {
            let nx = cell.x + n.dx, ny = cell.y + n.dy;
            if (nx>=0 && nx<6 && ny>=0 && ny<6 && gridData[ny][nx] && !visited.has(`${nx},${ny}`)) {
                visited.add(`${nx},${ny}`); queue.push({cell: {x:nx, y:ny}, parentMesh: currentMesh, dir: n.dir});
            }
        }
    }

    // 全てのマスが繋がっているか（孤立していないか）チェック
    if(visited.size !== 6) {
        res.innerText = "❌ 面が繋がっていないところがあるよ！"; res.style.color = "#F44336"; playSound('error'); return;
    }

    // 🌟 3. Three.jsの行列計算を使って、組み立て後の「面の向き」をシミュレーション
    // 一度すべてのヒンジを折りたたんだ状態にする
    hingeGroups.forEach(h => { h.rotation.x = h.userData.rot.x; h.rotation.y = h.userData.rot.y; });
    rootMesh.updateMatrixWorld(true);

    let normals = new Set();
    allMeshes.forEach(mesh => {
        // 各面のローカルの「表向き(0,0,1)」が、ワールド空間でどの方向を向いているか計算
        let normal = new THREE.Vector3(0, 0, 1);
        normal.transformDirection(mesh.matrixWorld);
        // 誤差をなくすため四捨五入して文字列化 (例: "1,0,0")
        let key = `${Math.round(normal.x)},${Math.round(normal.y)},${Math.round(normal.z)}`;
        normals.add(key);
    });

    // 6つの異なる向き（±X, ±Y, ±Z）が揃っていれば正解！
    const isCorrect = (normals.size === 6);

    // アニメーションのためにヒンジを平ら（0度）に戻す
    hingeGroups.forEach(h => { h.rotation.x = 0; h.rotation.y = 0; });
    rootMesh.updateMatrixWorld(true);

    // テキスト結果表示
    if (isCorrect) {
        res.innerHTML = "✨ 組み立てられそう！みてみよう！"; res.style.color = "#4CAF50";
    } else {
        res.innerHTML = "💦 あれ？どこかが重なっちゃうかも…？"; res.style.color = "#F44336";
    }

    // 描画ループ開始
    const renderLoop = () => { animationId = requestAnimationFrame(renderLoop); threeRenderer.render(threeScene, threeCamera); };
    renderLoop();

    // 🌟 4. 結果に応じたアニメーション再生
    const tl = gsap.timeline({
        onComplete: () => {
            if(isCorrect){ document.getElementById('success-mark').style.display = 'block'; playSound('success'); res.innerHTML = "⭕️ 大正解！立方体になったね！"; }
            else { document.getElementById('fail-mark').style.display = 'block'; playSound('error'); res.innerHTML = "❌ 残念！面が重なってしまったよ。"; }
        }
    });

    tl.to(rootMesh.rotation, { z: Math.PI/4, duration: 1, ease: "power2.inOut" }, 0); // 見やすく回転

    if (isCorrect) {
        // 【正解時】パタパタと綺麗に折りたたむ
        hingeGroups.forEach((hinge, index) => {
            tl.to(hinge.rotation, { x: hinge.userData.rot.x, y: hinge.userData.rot.y, duration: 1.0, ease: "power2.inOut" }, index * 0.15);
        });
    } else {
        // 【不正解時】途中まで組み立ててから、バラバラに崩れ落ちる
        // まず少しだけ折りたたむ動きを見せる
        hingeGroups.forEach((hinge, index) => {
            tl.to(hinge.rotation, { x: hinge.userData.rot.x * 0.8, y: hinge.userData.rot.y * 0.8, duration: 0.8, ease: "power1.inOut" }, index * 0.1);
        });

        // 重なった瞬間にバラバラに落ちる！
        const dropDelay = hingeGroups.length * 0.1 + 0.5;
        allMeshes.forEach((mesh) => {
             gsap.to(mesh.position, {
                 x: (Math.random() - 0.5) * 8, // ランダムに散らばる
                 y: -10, // 下に落ちる
                 z: (Math.random() - 0.5) * 8,
                 duration: 1.5,
                 ease: "power2.in",
                 delay: dropDelay
             });
             gsap.to(mesh.rotation, {
                 x: Math.random() * Math.PI * 4,
                 y: Math.random() * Math.PI * 4,
                 duration: 1.5,
                 ease: "power2.in",
                 delay: dropDelay
             });
        });
    }
}

// ==========================================
// ✏️ クイズ機能（変更なし）
// ==========================================
let shuffledQuestions = []; let currentQuestionIndex = 0; let correctCount = 0;
function initQuiz() {
    const container = document.getElementById('questions-container');
    if (typeof questionsData === 'undefined' || questionsData.length === 0) { container.innerHTML = '<p style="text-align:center; color:red; font-weight:bold;">問題が見つかりません</p>'; return; }
    shuffledQuestions = [...questionsData].sort(() => Math.random() - 0.5); currentQuestionIndex = 0; correctCount = 0; renderSingleQuestion();
}
function renderSingleQuestion() {
    const container = document.getElementById('questions-container');
    if (currentQuestionIndex >= shuffledQuestions.length) {
        container.innerHTML = `<div class="question-box" style="text-align:center;"><h2 style="color:#E65100;">🎉 おつかれさま！ 🎉</h2><p style="font-size: 1.5rem; font-weight:bold; color: #4CAF50;">せいかい： ${correctCount} / ${shuffledQuestions.length} もん</p><button onclick="initQuiz()" style="font-size: 1.1rem; padding: 10px 30px; margin-top:15px;">もういちど遊ぶ</button></div>`; return;
    }
    const q = shuffledQuestions[currentQuestionIndex];
    let html = `<div class="question-box"><h4 style="color: #4CAF50; margin-top:0;">だい ${currentQuestionIndex + 1} もん</h4><h3 style="margin-top: 5px;">${q.title}</h3>${q.description ? `<p>${q.description}</p>` : ''}${q.svg ? `<div class="svg-container">${q.svg}</div>` : ''}`;
    q.subQuestions.forEach(sq => {
        html += `<p style="font-weight:bold;">${sq.text} </p><p>`;
        if (sq.type === "select") { html += `<select id="q_${sq.id}"><option value="">えらんでね</option>`; sq.options.forEach(opt => { html += `<option value="${opt}">${opt}</option>`; }); html += `</select>`; if (sq.unit) html += ` ${sq.unit}`; } 
        else { html += `<input type="number" id="q_${sq.id}">`; if (sq.unit) html += ` ${sq.unit}`; }
        html += ` <span id="res_${sq.id}" class="feedback"></span></p>`;
    });
    html += `<div style="text-align:center; margin-top:20px;" id="action-area"><button onclick="checkDynamicQ(${q.id})" style="font-size: 1.1rem; padding: 10px 30px;">こたえあわせ</button></div></div>`;
    container.innerHTML = html;
}
function checkDynamicQ(questionId) {
    const question = shuffledQuestions.find(q => q.id === questionId); if (!question) return;
    let allCorrect = true;
    question.subQuestions.forEach(sq => {
        const inputEl = document.getElementById(`q_${sq.id}`); const resEl = document.getElementById(`res_${sq.id}`);
        if (inputEl.value.trim() === sq.answer) { resEl.innerHTML = "⭕️ 正解！"; resEl.className = "feedback correct"; } 
        else { resEl.innerHTML = "❌ もういちど"; resEl.className = "feedback incorrect"; allCorrect = false; }
    });
    const actionArea = document.getElementById('action-area');
    if(allCorrect) { playSound('success'); correctCount++; actionArea.innerHTML = `<button onclick="nextQuestion()" style="background:#4CAF50; font-size: 1.2rem; padding: 10px 30px; box-shadow: 0 4px 0 #388E3C;">つぎの問題へ ➡️</button>`; } 
    else { playSound('error'); if (!document.getElementById('skip-btn')) { actionArea.innerHTML += `<br><button id="skip-btn" onclick="skipQuestion()" style="background:#999; margin-top:15px; box-shadow: 0 4px 0 #666;">パスしてつぎへ ➡️</button>`; } }
}
function nextQuestion() { playSound('click'); currentQuestionIndex++; renderSingleQuestion(); }
function skipQuestion() { playSound('click'); currentQuestionIndex++; renderSingleQuestion(); }
window.addEventListener("DOMContentLoaded", initQuiz);

</script>
